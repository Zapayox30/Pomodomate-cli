name: Release

# Actions are pinned to commit SHAs rather than moving tags: this workflow has
# contents: write and publishes the binaries users download, so a compromised
# or retagged action would ship straight to them.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Release (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            features: audio
            packages: libasound2-dev
          - target: aarch64-unknown-linux-gnu
            # No ALSA for this architecture on the runner, so the ambient
            # sound feature is left out of the aarch64 binary.
            features: ""
            packages: gcc-aarch64-linux-gnu
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - if: matrix.packages
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}
      - run: cargo build --release --target ${{ matrix.target }} --features "${{ matrix.features }}"
      - name: Package tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf pomodomate-${{ github.ref_name }}-${{ matrix.target }}.tar.gz pomodomate
      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: target/${{ matrix.target }}/release/pomodomate-*.tar.gz
          generate_release_notes: true
